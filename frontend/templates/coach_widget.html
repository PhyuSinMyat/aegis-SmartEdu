    /* ══════════════════════════════════════════════════════════════
       AI STUDY COACH — FRONTEND LOGIC
       ══════════════════════════════════════════════════════════════ */

    window.CoachState = {
        isOpen: false,
    };

    /* ── Panel toggle ─────────────────────────────────────────────── */
    function toggleCoachPanel() {
        const panel = document.getElementById('ai-coach-panel');
        const bubble = document.getElementById('ai-coach-bubble');
        window.CoachState.isOpen = !window.CoachState.isOpen;

        if (window.CoachState.isOpen) {
            panel.classList.add('coach-visible');
            bubble.classList.add('is-open');
            document.getElementById('coach-badge').style.display = 'none';
            showScreen('menu');
        } else {
            panel.classList.remove('coach-visible');
            bubble.classList.remove('is-open');
        }
    }

    /* ── Screen navigation ────────────────────────────────────────── */
    function showScreen(screenId) {
        document.querySelectorAll('.coach-screen').forEach(el => el.classList.remove('active'));
        const target = document.getElementById(`coach-screen-${screenId}`);
        if (target) target.classList.add('active');
        const body = document.querySelector('.coach-body');
        if (body) body.scrollTop = 0;
    }

    /* ── Global hook for other pages to trigger confusion ─────────── */
    window.triggerCoachConfusion = function (contextString) {
        if (!window.CoachState.isOpen) toggleCoachPanel();
        showScreen('confusion');
        if (contextString) {
            document.getElementById('confusion-context').value = contextString;
        }
    };

    /* ── Show result card ─────────────────────────────────────────── */
    function showResult({ type, label, icon, body, showClose }) {
        const card = document.getElementById('coach-response-card');
        const lbl = document.getElementById('coach-response-label-text');
        const bdy = document.getElementById('coach-response-body');
        const close = document.getElementById('coach-result-close-btn');

        card.className = `coach-response-card ${type} active`;
        lbl.innerHTML = `<i class="fa-solid ${icon}"></i> ${label}`;
        bdy.innerHTML = body;
        close.style.display = showClose ? 'block' : 'none';

        showScreen('result');
    }

    /* ── Today's plan screen ──────────────────────────────────────── */
    async function showPlanScreen() {
        showScreen('plan');
        const container = document.getElementById('coach-plan-content');
        container.innerHTML = `
            <div class="coach-loading active" style="padding:20px 0;">
                <div class="coach-dots">
                    <div class="coach-dot"></div><div class="coach-dot"></div><div class="coach-dot"></div>
                </div>
                <p class="coach-loading-text">Loading your schedule…</p>
            </div>`;

        try {
            const resp = await fetch('/tracker/schedule');
            const data = await resp.json();
            const sessions = data.sessions || [];
            const nextSession = data.next_session || null;
            const today = data.today || '';

            if (!sessions.length) {
                container.innerHTML = `
                    <div class="plan-empty">
                        <div style="font-size:2rem;margin-bottom:8px;">📭</div>
                        <strong>No sessions scheduled for today</strong><br>
                        Head to the Plan page to generate your study schedule.
                    </div>`;
                return;
            }

            let html = `<p class="plan-day-label">📅 ${today}</p>`;
            sessions.forEach(s => {
                const isNext = nextSession && s.start === nextSession.start && s.subject === nextSession.subject;
                html += `
                    <div class="plan-slot${isNext ? ' next-up' : ''}">
                        <span class="plan-slot-time">${s.start} – ${s.end}</span>
                        <span class="plan-slot-subject">${s.subject}</span>
                        ${isNext ? '<span class="plan-slot-tag">NEXT UP</span>' : ''}
                    </div>`;
            });

            if (!nextSession) {
                html += `<p style="font-size:.78rem;color:#9ca3af;text-align:center;margin-top:10px;">All sessions done for today 🎉</p>`;
            }

            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = `<div class="plan-empty">Could not load your schedule. Please try again.</div>`;
        }
    }

    /* ── API: Submit confusion ────────────────────────────────────── */
    async function submitConfusion(type) {
        const context = (document.getElementById('confusion-context').value || '').trim();
        if (!context) {
            document.getElementById('confusion-context').focus();
            document.getElementById('confusion-context').classList.add('coach-input-error');
            document.getElementById('confusion-context').style.borderColor = '#f87171';
            document.getElementById('confusion-context').style.boxShadow = '0 0 0 3px rgba(239,68,68,0.12)';
            setTimeout(() => {
                document.getElementById('confusion-context').style.borderColor = '';
                document.getElementById('confusion-context').style.boxShadow = '';
            }, 1800);
            return;
        }

        const labels = {
            concept: ['📖', 'Explanation'],
            example: ['🔍', 'Example'],
            steps: ['📋', 'Step-by-Step'],
            application: ['🚀', 'Real-World Use'],
        };

        document.getElementById('coach-loading-text').innerText = 'Generating explanation…';
        showScreen('loading');

        try {
            const resp = await fetch('/api/coach/confusion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ context, confusion_type: type }),
            });
            const data = await resp.json();
            const [icon, label] = labels[type] || ['🎓', 'Explanation'];
            showResult({
                type: 'explanation',
                label,
                icon: 'fa-graduation-cap',
                body: (data.explanation || '').replace(/\n/g, '<br>'),
                showClose: false,
            });
        } catch (e) {
            showScreen('confusion');
        }
    }

    /* ── Init ─────────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function () {
        /*
         * FIX: Any ancestor with backdrop-filter, transform, or filter
         * creates a new stacking context that breaks position:fixed —
         * making the button appear in the wrong corner and scroll away.
         *
         * Solution: reparent both coach elements directly onto <body>
         * so they are always anchored to the true viewport.
         */
        const bubble = document.getElementById('ai-coach-bubble');
        const panel = document.getElementById('ai-coach-panel');

        if (bubble && bubble.parentElement !== document.body) {
            document.body.appendChild(bubble);
        }
        if (panel && panel.parentElement !== document.body) {
            document.body.appendChild(panel);
        }

        /* Enforce correct fixed position via inline style as a safety net */
        if (bubble) {
            bubble.style.cssText += ';position:fixed!important;bottom:28px!important;right:28px!important;left:auto!important;top:auto!important;';
        }
        if (panel) {
            panel.style.cssText += ';position:fixed!important;bottom:100px!important;right:28px!important;left:auto!important;top:auto!important;max-height:min(560px, calc(100vh - 130px))!important;';
        }

    });
</script>
